<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Szöveg elemző weboldal</title>
    <link rel="stylesheet" href="indexMain.css">
</head>
<body>

<div class="container">
    <h1>Szöveg elemző</h1>

    <textarea id="textInput" class="hover-effect"
        placeholder="Írj ide szöveget..."></textarea><br>

    <button id="analyzeBtn" class="hover-effect">Elemzés</button>

    <h2>Eredmény:</h2>
    <div id="result"></div>
</div>
<div id="wave"></div>
<script>
const button = document.getElementById("analyzeBtn");
const wave = document.getElementById("wave");

button.addEventListener("click", () => {

    wave.classList.remove("wave-active");
    void wave.offsetWidth;
    wave.classList.add("wave-active");

    button.classList.add("pulse");
    setTimeout(() => button.classList.remove("pulse"), 400);

    let text = document.getElementById("textInput").value;

    fetch("process.php", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "text=" + encodeURIComponent(text)
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("result").innerHTML =
            "Szavak száma: " + data.words + "<br>" +
            "Karakterek száma: " + data.characters + "<br>" +
            "Leggyakoribb szó: " + data.most_common;
    });
});
</script>

</body>
</html>
