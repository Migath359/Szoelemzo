<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Szöveg elemző</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        textarea {
            width: 300px;
            height: 150px;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>Szöveg elemző</h1>

<textarea id="textInput" placeholder="Írj ide szöveget..."></textarea><br>
<button onclick="analyzeText()">Elemzés</button>

<h2>Eredmény:</h2>
<div id="result"></div>

<script>
function analyzeText() {
    let text = document.getElementById("textInput").value;

    fetch("process.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "text=" + encodeURIComponent(text)
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("result").innerHTML =
            "Szavak száma: " + data.words + "<br>" +
            "Karakterek száma: " + data.characters + "<br>" +
            "Leggyakoribb szó: " + data.most_common;
    });
}
</script>

</body>
</html>
