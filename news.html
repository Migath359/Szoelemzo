<head>
    <meta charset="UTF-8">
    <title>This site</title>
    <link rel="stylesheet" href="indexMain.css">
    <link rel="stylesheet" href="news.css">
</head>
<body>

<div class="navbar">
    <a href="index.html" class="nav-item">Main site</a>
    <a href="news.html" class="nav-item active">Next site</a>
</div>

<div class="center-wrapper">
    <div class="news-container">
        <div class="search-box">

            <input type="text" id="searchInput" placeholder="Search articles...">
            <button id="searchBtn">Search</button>

        </div>

        <div id="newsResult"></div>
    </div>
</div>
<script>
document.getElementById("searchBtn").addEventListener("click", () => {

    let query = document.getElementById("searchInput").value;

    fetch("search.php", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "query=" + encodeURIComponent(query)
    })
    .then(res => res.json())
    .then(data => {

    console.log(data);

    let html = "";

    data.articles.forEach(article => {
        html += `
            <div class="news-card">
                <h3>${article.title}</h3>
                <p>${article.desc || "No description"}</p>
            </div>
        `;
    });

    document.getElementById("newsResult").innerHTML = html;
});
});
</script>
</body>
</html>
