<head>
    <meta charset="UTF-8">
    <title>News site</title>
    <link rel="stylesheet" href="indexMain.css">
    <link rel="stylesheet" href="news.css">
</head>
<div class="navbar">
    <a href="index.html" class="nav-item">Analyzer</a>
    <a href="news.html" class="nav-item">News</a>
    <a href="saved_news.html" class="nav-item active">Saved Articles</a>
</div>
<div class="center-wrapper">
    <div class="news-container" id="newsContainer">
        <h1>News</h1>
        <div class="search-box" id="searchBox">
            <input type="text" id="searchInput" placeholder="Search articles...">
            <button id="searchBtn">Search</button>
        </div>
    </div>
</div>
<div class="news-panel">
    <div id="newsResult"></div>
</div>
<body>
<script>
function saveArticle(article, btn) {
    fetch("save_article.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(article)
    })
    .then(res => res.json())
    .then(data => {
        btn.innerText = "Saved";
        btn.classList.add("saved");
        btn.disabled = true;
        setTimeout(() => {
            btn.classList.remove("saved");
        }, 600);
    });
}
const searchBox = document.getElementById("searchBox");
const newsContainer = document.getElementById("newsContainer");

document.getElementById("searchBtn").addEventListener("click", () => {
    let query = document.getElementById("searchInput").value;
    if (!query.trim()) return;

    searchBox.classList.add("top");
    newsContainer.classList.add("active");
    const panel = document.querySelector(".news-panel");
    panel.style.transform = "translate(-50%, 0)";
    fetch("search.php", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "query=" + encodeURIComponent(query)
    })
    .then(res => res.json())
    .then(data => {
        let html = "";
        data.articles.forEach(article => {
            const date = article.date
                ? new Date(article.date).toLocaleDateString()
                : "";
            html += `
                <div class="news-card">
                    <div class="news-image">
                        ${article.image 
                            ? `<img src="${article.image}">` 
                            : `<div class="no-image">No image</div>`
                        }
                    </div>
                    <div class="news-content">
                        <h3>
                            <a href="${article.url}" target="_blank">
                                ${article.title}
                            </a>
                        </h3>
                        <div class="news-meta">
                            <span class="source">${article.source}</span>
                            <span class="date">${date}</span>
                        </div>
                        <p>${article.desc || "No description"}</p>
                        <button class="save-btn" onclick='saveArticle(${JSON.stringify(article)}, this)'>
                            Save
                        </button>
                    </div>
                </div>
            `;
        });
        document.getElementById("newsResult").innerHTML = html;
    });
});
</script>
</body>
</html>
